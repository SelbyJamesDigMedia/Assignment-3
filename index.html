<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Orchestra</title>

    <!--Link the css file to the html file-->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!--I created a container for all of the planets inside of my space image-->
    <div id="space">
        <!--I assigned each planet to the planet class to avoid code repetition in my css and javascript files
        I used the following video to better understand how they work: https://www.youtube.com/watch?v=5L7aKOS02no-->
        <div id="sun" class="planet"></div>
        <div id="pad" class="planet"></div>
        <div id="bass" class="planet"></div>
        <div id="drums" class="planet"></div>
    </div>


    <!--Link the javascript file to the html-->
    <script src="script.js"></script>

</body>
</html>
